<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>dream2be</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 0%, #141028 0%, #0b091a 60%, #05040e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      padding: 16px;
      overflow-x: hidden;
      color: #fff;
    }



    /* ── Spark Particles ── */
    #sparkCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Header ── */
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,200,150,0.25), 0 0 60px rgba(255,150,80,0.1);
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    /* ── Glass Candle ── */
    .candle-scene {
      position: relative;
      width: 120px;
      height: 200px;
      margin: 0 auto 24px;
    }

    /* Halo underneath */
    .candle-halo {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(255,180,80,0.25) 0%, transparent 70%);
      border-radius: 50%;
      transition: all 0.6s;
    }
    .candle-halo.lit {
      width: 110px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(255,180,80,0.5) 0%, rgba(255,120,40,0.2) 40%, transparent 70%);
    }

    /* Glass body */
    .glass-body {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100px;
      background: linear-gradient(180deg,
        rgba(255,220,180,0.08) 0%,
        rgba(255,200,150,0.04) 40%,
        rgba(200,180,160,0.06) 100%);
      border: 1px solid rgba(255,220,180,0.15);
      border-radius: 8px 8px 14px 14px;
      backdrop-filter: blur(4px);
      box-shadow:
        inset -4px 0 rgba(255,255,255,0.05),
        inset 4px 0 rgba(0,0,0,0.1),
        0 0 20px rgba(255,180,80,0.05);
      overflow: hidden;
    }
    /* Wax fill */
    .glass-body::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(180deg,
        rgba(255,220,180,0.12) 0%,
        rgba(240,200,160,0.08) 100%);
      border-radius: 0 0 13px 13px;
    }
    /* Glass sheen */
    .glass-body::before {
      content: '';
      position: absolute;
      top: 8%;
      left: 8px;
      width: 4px;
      height: 35%;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
    }

    /* Wick */
    .wick {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: linear-gradient(180deg, #666 0%, #444 100%);
      border-radius: 1px;
      z-index: 2;
    }

    /* Flame */
    .flame-group {
      position: absolute;
      bottom: 122px;
      left: 50%;
      transform-origin: bottom center;
      z-index: 3;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .flame-core {
      width: 10px;
      height: 22px;
      background: radial-gradient(ellipse at center,
        #fff 0%, #ffe8b0 25%, #ff9944 55%, #ff6600 80%, transparent 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin: 0 auto -6px;
      animation: flicker 1.6s ease-in-out infinite alternate;
      box-shadow:
        0 0 20px 6px rgba(255,200,80,0.4),
        0 0 50px 18px rgba(255,150,40,0.2);
    }
    .flame-outer {
      width: 18px;
      height: 32px;
      background: radial-gradient(ellipse at center,
        rgba(255,200,80,0.3) 0%,
        rgba(255,120,30,0.15) 50%,
        transparent 100%);
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 0 30px 10px rgba(255,180,60,0.15);
      animation: flicker 1.8s ease-in-out infinite alternate-reverse;
    }

    /* Lit state — flame grows */
    .flame-group.lit .flame-core {
      width: 16px;
      height: 36px;
      box-shadow:
        0 0 30px 10px rgba(255,200,80,0.6),
        0 0 70px 28px rgba(255,150,40,0.35);
      animation-duration: 1.2s;
    }
    .flame-group.lit .flame-outer {
      width: 28px;
      height: 50px;
      box-shadow: 0 0 50px 20px rgba(255,180,60,0.25);
    }

    /* Unlit — hidden */
    .flame-group.unlit { opacity: 0; transform: translateX(-50%) scale(0.5); }
    .flame-group.unlit .flame-core { box-shadow: none; }

    @keyframes flicker {
      0%   { transform: scaleY(1) scaleX(1); }
      20%  { transform: scaleY(1.06) scaleX(0.93); }
      40%  { transform: scaleY(0.94) scaleX(1.04); }
      60%  { transform: scaleY(1.02) scaleX(0.97); }
      80%  { transform: scaleY(0.96) scaleX(1.02); }
      100% { transform: scaleY(1) scaleX(1); }
    }

    .candle-label {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── Input ── */
    .input-wrap {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 96px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      resize: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    textarea::placeholder { color: rgba(255,255,255,0.2); }
    textarea:focus {
      border-color: rgba(255,180,80,0.3);
      box-shadow: 0 0 24px rgba(255,150,50,0.08);
    }

    /* ── CTA Button ── */
    .btn-wrap {
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, #ff8c38, #ff6622);
      border: none;
      border-radius: 18px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow:
        0 4px 20px rgba(255,100,30,0.3),
        0 0 40px rgba(255,100,30,0.1);
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(255,100,30,0.4),
        0 0 60px rgba(255,120,40,0.2);
    }

    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Heart Icon ── */
    .heart-icon {
      font-size: 20px;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.3s;
      margin-bottom: 28px;
    }
    .heart-icon:hover { transform: scale(1.15); }
    .heart-icon.saved { animation: heartPop 0.4s ease; }
    @keyframes heartPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ── Dream Spark ── */
    .spark-wrap {
      display: none;
      justify-content: center;
      align-items: center;
    }
    .spark-wrap.show {
      display: flex;
    }
    .spark-wrap svg {
      width: 300px;
      height: 300px;
      filter: drop-shadow(0 0 50px rgba(255,180,80,0.4));
      animation: sparkFloat 4s ease-in-out infinite;
    }
    @keyframes sparkFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.02); }
    }
    .spark-burst {
      animation: burstIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes burstIn {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .spark-burst-finish {
      /* after burst, let sparkFloat take over */
      animation: sparkFloat 4s ease-in-out infinite;
    }

    /* ── Success Message ── */
    .success-msg {
      margin-top: 16px;
      font-size: 16px;
      color: rgba(255,220,180,0.8);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-height: 24px;
    }
    .success-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Phoenix / Fire Particles (bottom accent) ── */
    .phoenix-area {
      position: relative;
      height: 60px;
      margin-top: 8px;
      overflow: hidden;
    }

    .phoenix-emoji {
      font-size: 40px;
      opacity: 0.15;
      display: inline-block;
      animation: phoenixGlow 3s ease-in-out infinite;
    }
    @keyframes phoenixGlow {
      0%, 100% { opacity: 0.12; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(1.05); }
    }

    /* ── Footer ── */
    .footer-note {
      margin-top: 12px;
      color: rgba(255,255,255,0.1);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      h1 { font-size: 24px; }
      .candle-scene { transform: scale(0.85); }
      button { font-size: 16px; padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <canvas id="sparkCanvas"></canvas>

  <div class="container">
    <h1>What is your dream?</h1>

    <!-- Glass Candle -->
    <div class="candle-scene">
      <div class="candle-halo" id="halo"></div>
      <div class="glass-body"></div>
      <div class="wick"></div>
      <div class="flame-group unlit" id="flameGroup">
        <div class="flame-outer"></div>
        <div class="flame-core"></div>
      </div>
    </div>
    <div class="candle-label">light your dream</div>

    <!-- Input -->
    <div class="input-wrap">
      <textarea id="dreamInput" placeholder="Type your dream..." maxlength="300"></textarea>
    </div>

    <!-- CTA Button -->
    <div class="btn-wrap">
      <button id="lightBtn">LIGHT MY DREAM</button>
    </div>

    <!-- Heart Icon -->
    <div class="heart-icon" id="heartIcon">🤍</div>

    <!-- Dream Spark (SVG) -->
    <div class="spark-wrap" id="sparkWrap">
      <svg id="dreamSpark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="40%" stop-color="#ffe8b0" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>
        <!-- Dynamic rays + particles injected by JS -->
        <g id="sparkGroup">
          <circle id="sparkHalo" cx="100" cy="100" r="55" fill="url(#coreGlow)" opacity="0.5"/>
        </g>
      </svg>
    </div>

    <!-- Success Message -->
    <div class="success-msg" id="successMsg"></div>

    <!-- Phoenix / Fire -->
    <div class="phoenix-area">
      <span class="phoenix-emoji">🕊️</span>
    </div>

    <div class="footer-note">dream big &bull; live bigger</div>
  </div>

  <script>
    // ── Spark Particles ──
    const canvas = document.getElementById('sparkCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const sparks = [];
    const SPARK_COUNT = 40;
    let isLit = false;

    class Spark {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * W;
        this.y = H + 20;
        this.size = Math.random() * 2.5 + 1;
        this.speedY = -(Math.random() * 1.2 + 0.4);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.4 + 0.15;
        this.hue = 30 + Math.random() * 30;
        this.litMultiplier = 1;
      }
      update() {
        this.y += this.speedY * this.litMultiplier;
        this.x += this.speedX;
        if (this.y < -20 || this.x < -20 || this.x > W + 20) {
          this.reset();
          this.y = H + 10;
        }
        // Fade near top
        if (this.y < H * 0.3) {
          this.opacity = Math.max(0, this.opacity * 0.98);
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, ${isLit ? 75 : 60}%, ${this.opacity})`;
        ctx.fill();
        // Glow
        ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${this.opacity * 0.5})`;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (let i = 0; i < SPARK_COUNT; i++) {
      const s = new Spark();
      s.y = Math.random() * H;
      sparks.push(s);
    }

    function animateSparks() {
      ctx.clearRect(0, 0, W, H);
      for (const s of sparks) {
        s.update();
        s.draw();
      }
      requestAnimationFrame(animateSparks);
    }
    animateSparks();

    // When lit, speed up and brighten
    function intensifySparks() {
      isLit = true;
      for (const s of sparks) {
        s.litMultiplier = 3;
        s.opacity = Math.min(1, s.opacity * 2.5);
      }
      // Spawn extra sparks
      for (let i = 0; i < 20; i++) {
        const s = new Spark();
        s.litMultiplier = 3;
        s.opacity = Math.random() * 0.6 + 0.3;
        s.y = H * 0.5 + Math.random() * H * 0.5;
        sparks.push(s);
      }
    }

    // ── Core Logic ──
    const dreamInput = document.getElementById('dreamInput');
    const lightBtn = document.getElementById('lightBtn');
    const flameGroup = document.getElementById('flameGroup');
    const halo = document.getElementById('halo');
    const successMsg = document.getElementById('successMsg');
    const heartIcon = document.getElementById('heartIcon');

    const dreamQuotes = [
      'Your dream has been lit ✨',
      'The universe is listening 🌙',
      'Your wish is on its way 🌟',
      'A spark has been ignited 🔥',
      'The stars are aligning ⭐',
      'Your dream is now alive 💫',
      'Manifestation begins ✨',
    ];

    lightBtn.addEventListener('click', () => {
      const dream = dreamInput.value.trim();
      if (!dream) {
        dreamInput.focus();
        dreamInput.style.borderColor = '#ff4444';
        setTimeout(() => dreamInput.style.borderColor = '', 1000);
        return;
      }

      // Disable button
      lightBtn.disabled = true;
      lightBtn.textContent = '✨ LIT ✨';

      // Light the candle
      flameGroup.classList.remove('unlit');
      flameGroup.classList.add('lit');
      halo.classList.add('lit');

      // Show themed photo
      document.getElementById('sparkWrap').classList.add('show');

      // Intensify particles
      intensifySparks();

      // Share dream to presentation feed
      const dreamEmoji = submitDream(dream);

      // Show success with emoji
      const quote = dreamQuotes[Math.floor(Math.random() * dreamQuotes.length)];
      successMsg.innerHTML = `${dreamEmoji} &ldquo;${dream}&rdquo; &mdash; ${quote}`;
      setTimeout(() => successMsg.classList.add('show'), 800);

      // Enable button after delay
      setTimeout(() => {
        lightBtn.disabled = false;
        lightBtn.textContent = 'LIGHT MY DREAM';
      }, 3000);
    });

    // Heart toggle
    heartIcon.addEventListener('click', () => {
      if (heartIcon.textContent === '🤍') {
        heartIcon.textContent = '❤️';
        heartIcon.classList.add('saved');
        setTimeout(() => heartIcon.classList.remove('saved'), 400);
      } else {
        heartIcon.textContent = '🤍';
      }
    });

    // Enter key (Shift+Enter for newline, plain Enter to submit)
    dreamInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        lightBtn.click();
      }
    });
  </script>
  <!-- Socket.io for dream sharing -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Connect to dream server
    let dreamSocket = null;
    try {
      dreamSocket = io('https://api.koli.emyx.us:3003', { transports: ['websocket', 'polling'] });
      dreamSocket.on('connect', () => {
        console.log('📡 Connected to dream server');
        dreamSocket.emit('identify', 'submitter');
      });
      dreamSocket.on('connect_error', (err) => {
        console.log('📡 Dream server unavailable (non-blocking):', err.message);
      });
    } catch(e) {
      console.log('Socket.io not available');
    }

    function submitDream(dreamText) {
      const emojis = ['✨','🌟','💫','⭐','🔥','🌙','🕯️','💭','🌈','⭐'];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      if (dreamSocket && dreamSocket.connected) {
        dreamSocket.emit('dream', { text: dreamText, emoji: emoji });
      }
      return emoji;
    }
  </script>
</body>
</html>
