<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>dream2be</title>
  <meta name="description" content="Light your dream and watch it soar">
  <meta name="theme-color" content="#ff6622">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="dream2be">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }
    body {
      background: radial-gradient(ellipse at 50% 0%, #141028 0%, #0b091a 60%, #05040e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      padding: 16px;
      overflow-x: hidden;
      color: #fff;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }



    /* ── Spark Particles ── */
    #sparkCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      height: -webkit-fill-available;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Header ── */
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,200,150,0.25), 0 0 60px rgba(255,150,80,0.1);
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    /* ── Glass Candle ── */
    .candle-scene {
      position: relative;
      width: 120px;
      height: 200px;
      margin: 0 auto 24px;
    }

    /* Halo underneath */
    .candle-halo {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(255,180,80,0.25) 0%, transparent 70%);
      border-radius: 50%;
      transition: all 0.6s;
    }
    .candle-halo.lit {
      width: 110px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(255,180,80,0.5) 0%, rgba(255,120,40,0.2) 40%, transparent 70%);
    }

    /* Glass body */
    .glass-body {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100px;
      background: linear-gradient(180deg,
        rgba(255,220,180,0.08) 0%,
        rgba(255,200,150,0.04) 40%,
        rgba(200,180,160,0.06) 100%);
      border: 1px solid rgba(255,220,180,0.15);
      border-radius: 8px 8px 14px 14px;
      backdrop-filter: blur(4px);
      box-shadow:
        inset -4px 0 rgba(255,255,255,0.05),
        inset 4px 0 rgba(0,0,0,0.1),
        0 0 20px rgba(255,180,80,0.05);
      overflow: hidden;
    }
    /* Wax fill */
    .glass-body::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(180deg,
        rgba(255,220,180,0.12) 0%,
        rgba(240,200,160,0.08) 100%);
      border-radius: 0 0 13px 13px;
    }
    /* Glass sheen */
    .glass-body::before {
      content: '';
      position: absolute;
      top: 8%;
      left: 8px;
      width: 4px;
      height: 35%;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
    }

    /* Wick */
    .wick {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: linear-gradient(180deg, #666 0%, #444 100%);
      border-radius: 1px;
      z-index: 2;
    }

    /* Flame */
    .flame-group {
      position: absolute;
      bottom: 122px;
      left: 50%;
      transform-origin: bottom center;
      z-index: 3;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .flame-core {
      width: 10px;
      height: 22px;
      background: radial-gradient(ellipse at center,
        #fff 0%, #ffe8b0 25%, #ff9944 55%, #ff6600 80%, transparent 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin: 0 auto -6px;
      animation: flicker 1.6s ease-in-out infinite alternate;
      box-shadow:
        0 0 20px 6px rgba(255,200,80,0.4),
        0 0 50px 18px rgba(255,150,40,0.2);
    }
    .flame-outer {
      width: 18px;
      height: 32px;
      background: radial-gradient(ellipse at center,
        rgba(255,200,80,0.3) 0%,
        rgba(255,120,30,0.15) 50%,
        transparent 100%);
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 0 30px 10px rgba(255,180,60,0.15);
      animation: flicker 1.8s ease-in-out infinite alternate-reverse;
    }

    /* Lit state — flame grows */
    .flame-group.lit .flame-core {
      width: 16px;
      height: 36px;
      box-shadow:
        0 0 30px 10px rgba(255,200,80,0.6),
        0 0 70px 28px rgba(255,150,40,0.35);
      animation-duration: 1.2s;
    }
    .flame-group.lit .flame-outer {
      width: 28px;
      height: 50px;
      box-shadow: 0 0 50px 20px rgba(255,180,60,0.25);
    }

    /* Unlit — hidden */
    .flame-group.unlit { opacity: 0; transform: translateX(-50%) scale(0.5); }
    .flame-group.unlit .flame-core { box-shadow: none; }

    @keyframes flicker {
      0%   { transform: scaleY(1) scaleX(1); }
      20%  { transform: scaleY(1.06) scaleX(0.93); }
      40%  { transform: scaleY(0.94) scaleX(1.04); }
      60%  { transform: scaleY(1.02) scaleX(0.97); }
      80%  { transform: scaleY(0.96) scaleX(1.02); }
      100% { transform: scaleY(1) scaleX(1); }
    }

    .candle-label {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── Input ── */
    .input-wrap {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 96px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      resize: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    textarea::placeholder { color: rgba(255,255,255,0.2); }
    textarea:focus {
      border-color: rgba(255,180,80,0.3);
      box-shadow: 0 0 24px rgba(255,150,50,0.08);
    }

    /* ── CTA Button ── */
    .btn-wrap {
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, #ff8c38, #ff6622);
      border: none;
      border-radius: 18px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow:
        0 4px 20px rgba(255,100,30,0.3),
        0 0 40px rgba(255,100,30,0.1);
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(255,100,30,0.4),
        0 0 60px rgba(255,120,40,0.2);
    }

    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Confirmation Modal ── */
    .confirm-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 50;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .confirm-overlay.show { display: flex; }

    .confirm-box {
      background: rgba(20,16,40,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px 24px 20px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      animation: confirmIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes confirmIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .confirm-box h3 {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,200,150,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .confirm-dream-preview {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255,255,255,0.8);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
    }
    .confirm-actions button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: none;
      letter-spacing: 0.5px;
    }
    .confirm-cancel {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
    }
    .confirm-cancel:hover { background: rgba(255,255,255,0.1); }
    .confirm-submit {
      background: linear-gradient(135deg, #ff8c38, #ff6622);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,100,30,0.3);
    }
    .confirm-submit:hover { transform: translateY(-1px); }

    /* ── Heart Icon ── */
    .heart-icon {
      font-size: 20px;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.3s;
      margin-bottom: 28px;
    }
    .heart-icon:hover { transform: scale(1.15); }
    .heart-icon.saved { animation: heartPop 0.4s ease; }
    @keyframes heartPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ── Dream Spark Overlay (Canvas) ── */
    .spark-wrap {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
      pointer-events: none;
    }
    .spark-wrap.show {
      display: block;
    }
    .spark-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Success Message ── */
    .success-msg {
      margin-top: 16px;
      font-size: 16px;
      color: rgba(255,220,180,0.8);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-height: 24px;
    }
    .success-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Phoenix / Fire Particles (bottom accent) ── */
    .phoenix-area {
      position: relative;
      height: 60px;
      margin-top: 8px;
      overflow: hidden;
    }

    .phoenix-emoji {
      font-size: 40px;
      opacity: 0.15;
      display: inline-block;
      animation: phoenixGlow 3s ease-in-out infinite;
    }
    @keyframes phoenixGlow {
      0%, 100% { opacity: 0.12; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(1.05); }
    }

    /* ── Footer ── */
    .footer-note {
      margin-top: 12px;
      color: rgba(255,255,255,0.1);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      h1 { font-size: 24px; }
      .candle-scene { transform: scale(0.85); }
      button { font-size: 16px; padding: 16px 20px; }
    }

    /* ── Submitted state ── */
    .container.submitted h1,
    .container.submitted .candle-scene,
    .container.submitted .candle-label,
    .container.submitted .input-wrap,
    .container.submitted .btn-wrap,
    .container.submitted .heart-icon {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="sparkCanvas"></canvas>

  <div class="container">
    <h1>What is your dream?</h1>

    <!-- Glass Candle -->
    <div class="candle-scene">
      <div class="candle-halo" id="halo"></div>
      <div class="glass-body"></div>
      <div class="wick"></div>
      <div class="flame-group unlit" id="flameGroup">
        <div class="flame-outer"></div>
        <div class="flame-core"></div>
      </div>
    </div>
    <div class="candle-label">light your dream</div>

    <!-- Input -->
    <div class="input-wrap">
      <textarea id="dreamInput" placeholder="Type your dream (max 20 words)..." maxlength="200" autofocus></textarea>
    </div>

    <!-- CTA Button -->
    <div class="btn-wrap">
      <button id="lightBtn">LIGHT MY DREAM</button>
    </div>

    <!-- Success Message -->
    <div class="success-msg" id="successMsg"></div>

    <!-- Confirmation Modal -->
    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-box">
        <h3>Light your dream?</h3>
        <div class="confirm-dream-preview" id="confirmPreview"></div>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirmCancel">Cancel</button>
          <button class="confirm-submit" id="confirmSubmit">✨ Light it</button>
        </div>
      </div>
    </div>

    <!-- Dream Spark Overlay (Canvas) -->
    <div class="spark-wrap" id="sparkWrap">
      <canvas id="sparkBurstCanvas"></canvas>
    </div>

    <!-- Phoenix / Fire -->
    <div class="phoenix-area">
      <span class="phoenix-emoji">🕊️</span>
    </div>

    <div class="footer-note">dream big &bull; live bigger</div>
  </div>

  <script>
    // ── Spark Particles ──
    const canvas = document.getElementById('sparkCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const sparks = [];
    const SPARK_COUNT = 40;
    let isLit = false;

    class Spark {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * W;
        this.y = H + 20;
        this.size = Math.random() * 2.5 + 1;
        this.speedY = -(Math.random() * 1.2 + 0.4);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.4 + 0.15;
        this.hue = 30 + Math.random() * 30;
        this.litMultiplier = 1;
      }
      update() {
        this.y += this.speedY * this.litMultiplier;
        this.x += this.speedX;
        if (this.y < -20 || this.x < -20 || this.x > W + 20) {
          this.reset();
          this.y = H + 10;
        }
        // Fade near top
        if (this.y < H * 0.3) {
          this.opacity = Math.max(0, this.opacity * 0.98);
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, ${isLit ? 75 : 60}%, ${this.opacity})`;
        ctx.fill();
        // Glow
        ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${this.opacity * 0.5})`;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (let i = 0; i < SPARK_COUNT; i++) {
      const s = new Spark();
      s.y = Math.random() * H;
      sparks.push(s);
    }

    function animateSparks() {
      ctx.clearRect(0, 0, W, H);
      for (const s of sparks) {
        s.update();
        s.draw();
      }
      requestAnimationFrame(animateSparks);
    }
    animateSparks();

    // When lit, speed up and brighten
    function intensifySparks() {
      isLit = true;
      for (const s of sparks) {
        s.litMultiplier = 3;
        s.opacity = Math.min(1, s.opacity * 2.5);
      }
      // Spawn extra sparks
      for (let i = 0; i < 20; i++) {
        const s = new Spark();
        s.litMultiplier = 3;
        s.opacity = Math.random() * 0.6 + 0.3;
        s.y = H * 0.5 + Math.random() * H * 0.5;
        sparks.push(s);
      }
    }

    // ── Spark Generator ──
    function renderSpark(dreamText, cx, cy) {
      // Use canvas for smooth, organic spark burst
      const c = document.getElementById('sparkBurstCanvas');
      const W = window.innerWidth, H = window.innerHeight;
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      if (cx === undefined) cx = W / 2;
      if (cy === undefined) cy = H / 2;

      // Cancel previous animation
      if (window._sparkRaf) cancelAnimationFrame(window._sparkRaf);
      if (window._sparkTimer) clearTimeout(window._sparkTimer);

      // Generate spark hue from dream text
      let h = 0;
      for (let i = 0; i < dreamText.length; i++) h = dreamText.charCodeAt(i) + ((h << 5) - h);
      const warmHues = [25, 35, 45, 50, 55, 320, 340, 350, 15, 30];
      const hue = warmHues[Math.abs(h) % warmHues.length];
      const sat = 88 + Math.abs(dreamText.length * 7) % 10;

      // Particle system
      const particles = [];
      const count = 150;
      const startTime = performance.now();

      for (let i = 0; i < count; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const speed = 2 + Math.random() * 10;
        const dist = 40 + Math.random() * Math.max(W, H) * 0.55;
        const size = 1.5 + Math.random() * 5;
        const life = 0.5 + Math.random() * 0.9;
        const colors = ['#fff', `hsl(${hue+20*Math.random()},${sat}%,85%)`, `hsl(${hue},${sat}%,60%)`, `hsl(${hue-15},${sat}%,70%)`];
        particles.push({
          x: cx, y: cy,
          tx: cx + Math.cos(angle) * dist,
          ty: cy + Math.sin(angle) * dist,
          mx: cx + Math.cos(angle) * dist * 0.3,
          my: cy + Math.sin(angle) * dist * 0.3,
          size, life, age: 0,
          color: colors[i % colors.length]
        });
      }

      // Big bright glow cores
      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const dist = 5 + Math.random() * 30;
        particles.push({
          x: cx, y: cy,
          tx: cx + Math.cos(angle) * dist,
          ty: cy + Math.sin(angle) * dist,
          mx: cx, my: cy,
          size: 10 + Math.random() * 15, life: 1.3, age: 0,
          color: '#fff', glow: true
        });
      }

      function animLoop(now) {
        const elapsed = (now - startTime) / 1000;
        if (elapsed > 5) {
          ctx.clearRect(0, 0, W, H);
          return;
        }

        ctx.clearRect(0, 0, W, H);

        for (const p of particles) {
          p.age += 0.016;
          const t = Math.min(p.age / p.life, 1);
          const ease = 1 - Math.pow(1 - t, 1.6);

          // Quadratic bezier: cx,cy → mx,my → tx,ty
          const u = 1 - ease;
          const x = u*u*cx + 2*u*ease*p.mx + ease*ease*p.tx;
          const y = u*u*cy + 2*u*ease*p.my + ease*ease*p.ty;
          const alpha = Math.max(0, 1 - t * 1.4);
          const s = p.size * (1 - t * 0.4);

          if (alpha <= 0) continue;

          if (p.glow) {
            const grad = ctx.createRadialGradient(x, y, 0, x, y, s * 4);
            grad.addColorStop(0, `rgba(255,255,255,${alpha * 0.7})`);
            grad.addColorStop(0.3, `rgba(255,200,150,${alpha * 0.25})`);
            grad.addColorStop(1, 'transparent');
            ctx.beginPath();
            ctx.arc(x, y, s * 4, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
          }

          // Spark with glow trail
          ctx.shadowColor = p.color;
          ctx.shadowBlur = s * 6;
          ctx.beginPath();
          ctx.arc(x, y, s, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = alpha;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        ctx.globalAlpha = 1;
        window._sparkRaf = requestAnimationFrame(animLoop);
      }

      window._sparkRaf = requestAnimationFrame(animLoop);

      // Auto-cleanup
      window._sparkTimer = setTimeout(() => {
        cancelAnimationFrame(window._sparkRaf);
        ctx.clearRect(0, 0, W, H);
        document.getElementById('sparkWrap').classList.remove('show');
      }, 5000);
    }

    // ── Core Logic ──
    const dreamInput = document.getElementById('dreamInput');
    const lightBtn = document.getElementById('lightBtn');
    const flameGroup = document.getElementById('flameGroup');
    const halo = document.getElementById('halo');
    const successMsg = document.getElementById('successMsg');

    const dreamQuotes = [
      'Your dream has been lit ✨',
      'The universe is listening 🌙',
      'Your wish is on its way 🌟',
      'A spark has been ignited 🔥',
      'The stars are aligning ⭐',
      'Your dream is now alive 💫',
      'Manifestation begins ✨',
    ];

    // ── Confirmation Modal ──
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmPreview = document.getElementById('confirmPreview');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmSubmit = document.getElementById('confirmSubmit');
    let pendingDream = '';

    function showConfirm(dream) {
      pendingDream = dream;
      confirmPreview.textContent = dream;
      confirmOverlay.classList.add('show');
    }

    function hideConfirm() {
      confirmOverlay.classList.remove('show');
      pendingDream = '';
    }

    confirmCancel.addEventListener('click', hideConfirm);
    confirmOverlay.addEventListener('click', (e) => {
      if (e.target === confirmOverlay) hideConfirm();
    });

    function executeSubmit(dream) {
      // Disable button
      lightBtn.disabled = true;
      lightBtn.textContent = '✨ LIT ✨';

      // Add submitted class to hide input elements
      document.querySelector('.container').classList.add('submitted');

      // Light the candle
      flameGroup.classList.remove('unlit');
      flameGroup.classList.add('lit');
      halo.classList.add('lit');

      // Intensify particles
      intensifySparks();

      // Share dream to presentation feed
      const dreamEmoji = submitDream(dream);

      // Show success with emoji — preserve newlines as <br>
      const quote = dreamQuotes[Math.floor(Math.random() * dreamQuotes.length)];
      const dreamHtml = dream.replace(/\n/g, '<br>');
      successMsg.innerHTML = `${dreamEmoji} <span id="burstText">&ldquo;${dreamHtml}&rdquo;</span> &mdash; ${quote}`;

      // Wait for show transition, then spark from dream text position
      setTimeout(() => {
        successMsg.classList.add('show');
        document.getElementById('sparkWrap').classList.add('show');
        const burstEl = document.getElementById('burstText');
        const rect = burstEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        renderSpark(dream, cx, cy);
      }, 400);

      // Enable button after delay
      setTimeout(() => {
        lightBtn.disabled = false;
        lightBtn.textContent = 'LIGHT MY DREAM';
      }, 3000);
    }

    confirmSubmit.addEventListener('click', () => {
      if (pendingDream) {
        const dream = pendingDream;
        hideConfirm();
        executeSubmit(dream);
      }
    });

    lightBtn.addEventListener('click', () => {
      const dream = dreamInput.value.trim();
      if (!dream) {
        dreamInput.focus();
        dreamInput.style.borderColor = '#ff4444';
        setTimeout(() => dreamInput.style.borderColor = '', 1000);
        return;
      }

      // Show confirmation modal instead of submitting directly
      showConfirm(dream);
    });

    // Fix iOS viewport cursor offset after keyboard dismiss
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (document.activeElement === dreamInput) {
          dreamInput.blur();
          dreamInput.focus();
        }
      });
    }

    // Word limit (max 20 words)
    const MAX_WORDS = 20;
    dreamInput.addEventListener('input', () => {
      const words = dreamInput.value.trim().split(/\s+/).filter(w => w.length > 0);
      if (words.length > MAX_WORDS) {
        const trimmed = words.slice(0, MAX_WORDS).join(' ');
        dreamInput.value = trimmed;
      }
      const remaining = MAX_WORDS - dreamInput.value.trim().split(/\s+/).filter(w => w.length > 0).length;
      dreamInput.style.borderColor = remaining <= 3 ? 'rgba(255,100,80,0.5)' : '';
    });

    // Enter key (Shift+Enter for newline, plain Enter to submit — via confirmation)
    dreamInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        lightBtn.click();
      }
    });

    // Keyboard support for confirmation modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && confirmOverlay.classList.contains('show')) {
        hideConfirm();
      }
      if (e.key === 'Enter' && confirmOverlay.classList.contains('show')) {
        confirmSubmit.click();
      }
    });
  </script>
  <!-- Socket.io for dream sharing -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Connect to dream server
    let dreamSocket = null;
    try {
      dreamSocket = io('https://api.dream2be.emyx.us:3003', { transports: ['websocket', 'polling'] });
      dreamSocket.on('connect', () => {
        console.log('📡 Connected to dream server');
        dreamSocket.emit('identify', 'submitter');
      });
      dreamSocket.on('connect_error', (err) => {
        console.log('📡 Dream server unavailable (non-blocking):', err.message);
      });
    } catch(e) {
      console.log('Socket.io not available');
    }

    function submitDream(dreamText) {
      const emojis = ['✨','🌟','💫','⭐','🔥','🌙','🕯️','💭','🌈','⭐'];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      if (dreamSocket && dreamSocket.connected) {
        dreamSocket.emit('dream', { text: dreamText, emoji: emoji });
      }
      return emoji;
    }
  </script>
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(r => console.log('SW registered', r.scope));
    }
  </script>
